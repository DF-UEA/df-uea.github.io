name: Generate Index.html

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Generate index.html
        run: |
          # Replace 'your-directory' with the actual directory path
          directory='wau-mods'

          # Create a list of files in the directory
          files=$(find "$directory" -type f)

          # Generate the index.html content
          html_content="<html><head><title>Index of $directory</title></head><body><h1>Index of $directory</h1><ul>"
          for file in $files; do
            html_content+="<li><a href='$file'>$file</a></li>"
          done
          html_content+="</ul></body></html>"

          # Write the index.html content to a file
          echo "$html_content" > "$directory/index.html"

      - name: Commit index.html
        run: |
          git add "$directory/index.html"
          git commit -m "Updated index.html"
          git push origin main
