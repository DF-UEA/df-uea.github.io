name: Generate Index.html

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate index.html
        run: |
          git config --global user.email "d.fawdon@uea.ac.uk"
          git config --global user.name "DF-UEA"
          directory='wau-mods'

          # Create a list of files in the directory
          run: |
          find wau-mods -type f -name '*.ps1' -exec basename {} \; | sed 's/\.ps1//' > index.html
      - name: Publish Index.html as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: index.html
          path: index.html

      - name: Commit index.html
        run: |
          git add "wau-mods/index.html"
          git commit -m "Updated index.html"
          git push origin main
